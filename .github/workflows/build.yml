name: build
on:
  push:
    branches: [main]
  pull_request:
jobs:
  build:
    # Needs a Swift 6 toolchain: the codebase relies on region-based isolation
    # (weak-self captures inside @MainActor Tasks) that Swift 5.10 rejects.
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v5
      - name: Build (release)
        run: swift build -c release
      - name: Test
        run: swift test
